repos:
  - repo: local
    hooks:
      - id: qa-dsl-generate
        name: qa-dsl-generate
        entry: bash -c 'go generate ./tools/localproductacceptance && git --git-dir=.git --work-tree=. add tools/localproductacceptance/*.generated.json'
        language: system
        pass_filenames: false
      - id: semantic-change-binding
        name: semantic-change-binding
        entry: go run ./tools/semanticchangebinding
        language: system
        pass_filenames: false
      - id: loop-registry
        name: loop-registry
        entry: bash -c 'set -e; path="$(git rev-parse --git-path riido-loop-registry-changed)"; prev="$(git rev-parse --git-path riido-loop-registry-previous)"; git diff --cached --name-only > "$path"; if ! git show HEAD:docs/30-architecture/loop-registry.riido.json > "$prev" 2>/dev/null; then cp docs/30-architecture/loop-registry.riido.json "$prev"; fi; go run ./tools/loopregistry -check-doc -changed-files "$path" -previous-manifest "$prev"'
        language: system
        pass_filenames: false
      - id: provider-model-live-evidence
        name: provider-model-live-evidence
        entry: bash -c 'go run ./tools/providermodelcatalog -out cmd/riido/provider_model_catalog.generated.json && git --git-dir=.git --work-tree=. add cmd/riido/provider_model_catalog.generated.json && RIIDO_PROVIDER_MODEL_LIVE=1 go test ./cmd/riido -run TestProviderRuntimeModelsLiveEvidence -count=1'
        language: system
        pass_filenames: false
  - repo: https://github.com/tekwizely/pre-commit-golang
    rev: v1.0.0-rc.4
    hooks:
      - id: go-fmt
      - id: go-vet-repo-mod
      - id: go-imports
      - id: golangci-lint-repo-mod
      - id: go-test-repo-mod
