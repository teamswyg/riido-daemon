name: loop-engineering-evidence

on:
  pull_request:
    paths:
      - ".github/workflows/loop-engineering-evidence.yml"
      - "docs/30-architecture/loop-engineering.md"
      - "docs/30-architecture/loop-engineering.riido.json"
      - "docs/30-architecture/loop-engineering/**"
      - "tools/loopevidence/**"
      - "go.mod"
      - "go.sum"
  push:
    branches: [main]
    paths:
      - ".github/workflows/loop-engineering-evidence.yml"
      - "docs/30-architecture/loop-engineering.md"
      - "docs/30-architecture/loop-engineering.riido.json"
      - "docs/30-architecture/loop-engineering/**"
      - "tools/loopevidence/**"
      - "go.mod"
      - "go.sum"

jobs:
  loop-engineering-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify loop engineering evidence
        run: |
          mkdir -p out
          go run ./tools/loopevidence \
            -check \
            -evidence-out out/loop-engineering-evidence.json
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: loop-engineering-evidence
          path: out/loop-engineering-evidence.json
          if-no-files-found: error
