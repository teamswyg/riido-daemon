name: toolargs-toolpolicy

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/toolargs-toolpolicy.yml"
      - "internal/agentbridge/**"
      - "internal/policy/**"
      - "docs/20-domain/provider-runtime.md"
      - "docs/20-domain/security.md"
      - "docs/20-domain/security-redaction.md"
      - "docs/20-domain/security-redaction/**"
      - "docs/migration/daemon.md"
      - "go.mod"
      - "go.sum"
  pull_request:
    paths:
      - ".github/workflows/toolargs-toolpolicy.yml"
      - "internal/agentbridge/**"
      - "internal/policy/**"
      - "docs/20-domain/provider-runtime.md"
      - "docs/20-domain/security.md"
      - "docs/20-domain/security-redaction.md"
      - "docs/20-domain/security-redaction/**"
      - "docs/migration/daemon.md"
      - "go.mod"
      - "go.sum"

jobs:
  tool-use-policy-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify no non-Riido Go dependencies
        run: |
          allowed="github.com/teamswyg/riido-contracts"
          disallowed="$(go list -m all | awk -v allowed="$allowed" 'NR > 1 && $1 != allowed { print $1 }')"
          if [ -n "$disallowed" ]; then
            printf 'Disallowed Go dependencies:\n%s\n' "$disallowed"
            exit 1
          fi
      - name: Verify toolargs/toolpolicy gates
        run: |
          go test ./internal/agentbridge/toolargs ./internal/agentbridge/toolpolicy ./internal/policy -run 'ToolArgs|ToolUse|ToolPolicy|Classify|AutoApprover|ToolStartGate|DecisionFor' -count=1
      - name: Write package workflow evidence
        if: always()
        run: |
          mkdir -p out
          go run ./tools/packageworkflowevidence \
            -workflow .github/workflows/toolargs-toolpolicy.yml \
            -evidence-out out/toolargs-toolpolicy-evidence.json
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: toolargs-toolpolicy-evidence
          path: out/toolargs-toolpolicy-evidence.json
          if-no-files-found: error
