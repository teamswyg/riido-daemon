name: security-invariants-docs

on:
  pull_request:
    paths:
      - ".github/workflows/security-invariants-docs.yml"
      - "docs/20-domain/security/invariants.md"
      - "docs/20-domain/security/invariants.riido.json"
      - "docs/20-domain/security/invariants/**"
      - "tools/securityinvariantsdocs/**"
      - "tools/policybundleevidence/**"
      - "internal/policy/**"
      - "internal/agentbridge/runtimeactor/**"
      - "internal/agentbridge/toolpolicy/**"
      - "go.mod"
      - "go.sum"
  push:
    branches: [main]
    paths:
      - ".github/workflows/security-invariants-docs.yml"
      - "docs/20-domain/security/invariants.md"
      - "docs/20-domain/security/invariants.riido.json"
      - "docs/20-domain/security/invariants/**"
      - "tools/securityinvariantsdocs/**"
      - "tools/policybundleevidence/**"
      - "internal/policy/**"
      - "internal/agentbridge/runtimeactor/**"
      - "internal/agentbridge/toolpolicy/**"
      - "go.mod"
      - "go.sum"

jobs:
  security-invariants-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify security invariant docs
        run: |
          mkdir -p out
          go run ./tools/securityinvariantsdocs \
            -check-doc \
            -evidence-out out/security-invariants-docs.json
          go run ./tools/policybundleevidence \
            -check-doc \
            -evidence-out out/policy-bundle-loader-evidence.json
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: security-invariants-docs
          path: out/*.json
          if-no-files-found: error
