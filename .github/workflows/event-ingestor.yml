name: event-ingestor

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/event-ingestor.yml"
      - "internal/ir/ingest/**"
      - "internal/policy/**"
      - "internal/workdir/**"
      - "docs/20-domain/security-redaction.md"
      - "docs/20-domain/security-redaction/**"
      - "docs/migration/daemon.md"
      - "go.mod"
      - "go.sum"
  pull_request:
    paths:
      - ".github/workflows/event-ingestor.yml"
      - "internal/ir/ingest/**"
      - "internal/policy/**"
      - "internal/workdir/**"
      - "docs/20-domain/security-redaction.md"
      - "docs/20-domain/security-redaction/**"
      - "docs/migration/daemon.md"
      - "go.mod"
      - "go.sum"

jobs:
  secret-redaction-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify no non-Riido Go dependencies
        run: |
          allowed="github.com/teamswyg/riido-contracts"
          disallowed="$(go list -m all | awk -v allowed="$allowed" 'NR > 1 && $1 != allowed { print $1 }')"
          if [ -n "$disallowed" ]; then
            printf 'Disallowed Go dependencies:\n%s\n' "$disallowed"
            exit 1
          fi
      - name: Verify EventIngestor redaction/audit gate
        run: |
          go test ./internal/policy ./internal/ir/ingest ./internal/workdir -run 'Redact|Secret|Ingest|RunEventSink|AppendEvents' -count=1
      - name: Write package workflow evidence
        if: always()
        run: |
          mkdir -p out
          go run ./tools/packageworkflowevidence \
            -workflow .github/workflows/event-ingestor.yml \
            -evidence-out out/event-ingestor-evidence.json
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: event-ingestor-evidence
          path: out/event-ingestor-evidence.json
          if-no-files-found: error
