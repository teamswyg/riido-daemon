name: executable-knowledge-coverage

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/executable-knowledge-coverage.yml"
      - "docs/30-architecture/**"
      - "tools/knowledgecoverage/**"
      - "go.mod"
      - "go.sum"
  pull_request:
    paths:
      - ".github/workflows/executable-knowledge-coverage.yml"
      - "docs/30-architecture/**"
      - "tools/knowledgecoverage/**"
      - "go.mod"
      - "go.sum"

jobs:
  executable-knowledge-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify executable knowledge coverage
        run: |
          mkdir -p out
          go test ./tools/knowledgecoverage -count=1
          go run ./tools/knowledgecoverage \
            -check-doc \
            -evidence-out out/executable-knowledge-coverage.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: executable-knowledge-coverage
          path: out/executable-knowledge-coverage.json
          if-no-files-found: error
