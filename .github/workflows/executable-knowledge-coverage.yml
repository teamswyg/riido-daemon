name: executable-knowledge-coverage

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/executable-knowledge-coverage.yml"
      - "docs/30-architecture/**"
      - "tools/knowledgecoverage/**"
      - "tools/semanticchangebinding/**"
      - "go.mod"
      - "go.sum"
  pull_request:
    paths:
      - ".github/workflows/executable-knowledge-coverage.yml"
      - "docs/30-architecture/**"
      - "tools/knowledgecoverage/**"
      - "tools/semanticchangebinding/**"
      - "go.mod"
      - "go.sum"

jobs:
  executable-knowledge-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify executable knowledge coverage
        run: |
          mkdir -p out
          go test ./tools/knowledgecoverage -count=1
          go test ./tools/semanticchangebinding -count=1
          go run ./tools/knowledgecoverage \
            -check-doc \
            -evidence-out out/executable-knowledge-coverage.json
          grep -q "loop_registry" out/executable-knowledge-coverage.json
          grep -q "local-qa-daily-evidence-sweep" out/executable-knowledge-coverage.json
          if go run ./tools/semanticchangebinding \
            -changed-files docs/30-architecture/closed-loop-maturity.dsl.json \
            -evidence-out out/semantic-change-binding-negative.json; then
            echo "negative semantic binding check unexpectedly passed" >&2
            exit 1
          fi
          go run ./tools/semanticchangebinding \
            -changed-files docs/30-architecture/closed-loop-maturity.dsl.json,tools/localproductacceptance/closed_loop_maturity_test.go,tools/localproductacceptance/closed_loop_maturity.generated.json,.github/workflows/local-qa-runner.yml,docs/30-architecture/loop-engineering/closed-loop-maturity.riido.json \
            -evidence-out out/semantic-change-binding.json
          if go run ./tools/semanticchangebinding \
            -changed-files tools/localqarunner/closed_loop_candidate_graph.go \
            -evidence-out out/local-qa-graph-negative.json; then
            echo "negative local QA graph binding check unexpectedly passed" >&2
            exit 1
          fi
          go run ./tools/semanticchangebinding \
            -changed-files tools/localqarunner/closed_loop_candidate_graph.go,tools/localqarunner/closed_loop_candidate_types.go,tools/localqarunner/closed_loop_candidate_test.go,tools/localqadashboard/run_candidate.go,tools/localqadashboard/run_evidence_test.go,tools/localqadashboard/render_expectation_test.go,.github/workflows/local-qa-runner.yml,docs/30-architecture/loop-engineering/local-qa-closed-loop-candidates.riido.json \
            -evidence-out out/local-qa-graph-binding.json
          if go run ./tools/semanticchangebinding \
            -changed-files docs/30-architecture/local-qa-daily-trigger.dsl.json \
            -evidence-out out/local-qa-schedule-negative.json; then
            echo "negative local QA schedule binding check unexpectedly passed" >&2
            exit 1
          fi
          go run ./tools/semanticchangebinding \
            -changed-files docs/30-architecture/local-qa-daily-trigger.dsl.json,tools/localqaschedule/evidence_types.go,tools/localqaschedule/evidence_test.go,tools/localqaschedule/trigger.go,tools/localqadashboard/schedule_evidence.go,tools/localqadashboard/schedule_evidence_checks.go,tools/localqadashboard/schedule_evidence_types.go,tools/localqadashboard/schedule_evidence_freshness_test.go,docs/30-architecture/local-acceptance-coverage.riido.json,docs/30-architecture/executable-knowledge.riido.json,docs/30-architecture/executable-knowledge.md,.github/workflows/local-qa-runner.yml,docs/30-architecture/loop-engineering/local-qa-daily-trigger.riido.json \
            -evidence-out out/local-qa-schedule-binding.json
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: executable-knowledge-coverage
          path: out/*
          if-no-files-found: error
