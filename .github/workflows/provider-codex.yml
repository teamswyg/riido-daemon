name: provider-codex

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/provider-codex.yml"
      - "internal/provider/codex/**"
      - "internal/agentbridge/**"
      - "internal/process/**"
      - "docs/20-domain/provider-runtime.md"
      - "docs/20-domain/security.md"
      - "docs/20-domain/workspace.md"
      - "docs/30-architecture/integration-matrix.md"
      - "docs/30-architecture/provider-validation-matrix.riido.json"
      - "docs/migration/daemon.md"
      - "tools/providervalidation/**"
      - "go.mod"
      - "go.sum"
  pull_request:
    paths:
      - ".github/workflows/provider-codex.yml"
      - "internal/provider/codex/**"
      - "internal/agentbridge/**"
      - "internal/process/**"
      - "docs/20-domain/provider-runtime.md"
      - "docs/20-domain/security.md"
      - "docs/20-domain/workspace.md"
      - "docs/30-architecture/integration-matrix.md"
      - "docs/30-architecture/provider-validation-matrix.riido.json"
      - "docs/migration/daemon.md"
      - "tools/providervalidation/**"
      - "go.mod"
      - "go.sum"

jobs:
  codex-adapter-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify no non-Riido Go dependencies
        run: |
          allowed="github.com/teamswyg/riido-contracts"
          disallowed="$(go list -m all | awk -v allowed="$allowed" 'NR > 1 && $1 != allowed { print $1 }')"
          if [ -n "$disallowed" ]; then
            printf 'Disallowed Go dependencies:\n%s\n' "$disallowed"
            exit 1
          fi
      - name: Verify Codex adapter stays daemon-local
        run: |
          imports="$(go list -f '{{range .Imports}}{{println .}}{{end}}{{range .TestImports}}{{println .}}{{end}}{{range .XTestImports}}{{println .}}{{end}}' ./internal/provider/codex)"
          forbidden="$(printf '%s\n' "$imports" | grep -E 'github.com/teamswyg/riido-daemon/internal/(task|project|riidoapi|riidoaiserver|mwsdbridge|agentbridge/(supervisor|controlplane))|github.com/teamswyg/riido-daemon/internal/provider/capability' || true)"
          if [ -n "$forbidden" ]; then
            printf 'Forbidden Codex adapter imports:\n%s\n' "$forbidden"
            exit 1
          fi
      - name: Verify Codex adapter gates
        run: |
          go test ./internal/provider/codex -count=1
      - name: Verify Codex full-access harness SSOT
        run: |
          go test ./tools/providervalidation -run TestProviderValidationMatrix -count=1
