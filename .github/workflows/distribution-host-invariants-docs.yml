name: distribution-host-invariants-docs

on:
  pull_request:
    paths:
      - ".github/workflows/distribution-host-invariants-docs.yml"
      - "docs/20-domain/distribution-host-integration/invariants.md"
      - "docs/20-domain/distribution-host-integration/invariants.riido.json"
      - "docs/20-domain/distribution-host-integration/invariants/**"
      - "docs/20-domain/distribution-host-integration/store-channel-policy/**"
      - "docs/30-architecture/store-distribution**"
      - "tools/distributionhostinvariantsdocs/**"
      - "internal/hostintegration/**"
      - "packaging/store/**"
      - "go.mod"
      - "go.sum"
  push:
    branches: [main]
    paths:
      - ".github/workflows/distribution-host-invariants-docs.yml"
      - "docs/20-domain/distribution-host-integration/invariants.md"
      - "docs/20-domain/distribution-host-integration/invariants.riido.json"
      - "docs/20-domain/distribution-host-integration/invariants/**"
      - "docs/20-domain/distribution-host-integration/store-channel-policy/**"
      - "docs/30-architecture/store-distribution**"
      - "tools/distributionhostinvariantsdocs/**"
      - "internal/hostintegration/**"
      - "packaging/store/**"
      - "go.mod"
      - "go.sum"

jobs:
  distribution-host-invariants-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify distribution host invariants docs
        run: |
          mkdir -p out
          go run ./tools/distributionhostinvariantsdocs \
            -check-doc \
            -evidence-out out/distribution-host-invariants-docs.json
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: distribution-host-invariants-docs
          path: out/*.json
          if-no-files-found: error
