name: daemon-lifecycle

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/daemon-lifecycle.yml"
      - "cmd/riido/**"
      - "internal/agentbridge/**"
      - "internal/provider/**"
      - "internal/process/**"
      - "internal/policy/**"
      - "internal/workdir/**"
      - "internal/lock/**"
      - "internal/logging/**"
      - "internal/taskdb/**"
      - "internal/hostintegration/**"
      - "docs/20-domain/provider-runtime.md"
      - "docs/20-domain/runtime-scheduling.md"
      - "docs/migration/cli.md"
      - "docs/migration/daemon.md"
      - "go.mod"
      - "go.sum"
  pull_request:
    paths:
      - ".github/workflows/daemon-lifecycle.yml"
      - "cmd/riido/**"
      - "internal/agentbridge/**"
      - "internal/provider/**"
      - "internal/process/**"
      - "internal/policy/**"
      - "internal/workdir/**"
      - "internal/lock/**"
      - "internal/logging/**"
      - "internal/taskdb/**"
      - "internal/hostintegration/**"
      - "docs/20-domain/provider-runtime.md"
      - "docs/20-domain/runtime-scheduling.md"
      - "docs/migration/cli.md"
      - "docs/migration/daemon.md"
      - "go.mod"
      - "go.sum"

jobs:
  daemon-lifecycle-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify no non-Riido Go dependencies
        run: |
          disallowed="$(go list -m all | awk 'NR > 1 && $1 != "github.com/teamswyg/riido-contracts" { print $1 }')"
          test -z "$disallowed" || { printf 'Disallowed Go dependencies:\n%s\n' "$disallowed"; exit 1; }
      - name: Verify daemon lifecycle public boundary
        run: |
          if grep -R --line-number -E 'github.com/teamswyg/riido_daemon|github.com/teamswyg/riido-daemon/internal/riidoaiserver' cmd/riido; then
            echo "cmd/riido daemon lifecycle must not import private source or server internals"; exit 1
          fi
      - name: Verify daemon local-only listener boundary
        run: |
          if grep -R --line-number -E 'net\.Listen\("tcp"|http\.ListenAndServe|:8080|0\.0\.0\.0' cmd/riido; then
            echo "daemon lifecycle must not open public TCP listeners"; exit 1
          fi
      - name: Verify daemon lifecycle black-box/domain gates
        run: |
          go test ./cmd/riido -run 'TestDaemon|TestLoadDaemon|TestBuildDaemon|TestForeground|TestDaemonBackground' -count=1
          go test ./cmd/riido ./internal/agentbridge/supervisor ./internal/agentbridge/controlplane/saasplane ./internal/agentbridge/controlplane/taskdbplane -count=1
          go build ./cmd/riido
          go run ./cmd/riido --help >/tmp/riido-help.txt 2>&1
          grep -q 'riido daemon start' /tmp/riido-help.txt
