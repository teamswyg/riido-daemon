name: migration-daemon-riidoapi-local-api-docs

on:
  pull_request:
    paths:
      - ".github/workflows/migration-daemon-riidoapi-local-api-docs.yml"
      - "docs/migration/daemon/riidoapi-local-api.md"
      - "docs/migration/daemon/riidoapi-local-api.riido.json"
      - "docs/migration/daemon/riidoapi-local-api/**"
      - "docs/executable-knowledge.md"
      - "docs/executable-knowledge.riido.json"
      - "tools/migrationdocs/**"
      - "tools/docmap/**"
      - "tools/knowledgecoverage/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/migration-daemon-riidoapi-local-api-docs.yml"
      - "docs/migration/daemon/riidoapi-local-api.md"
      - "docs/migration/daemon/riidoapi-local-api.riido.json"
      - "docs/migration/daemon/riidoapi-local-api/**"
      - "docs/executable-knowledge.md"
      - "docs/executable-knowledge.riido.json"
      - "tools/migrationdocs/**"
      - "tools/docmap/**"
      - "tools/knowledgecoverage/**"

jobs:
  migration-daemon-riidoapi-local-api-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify migration daemon riidoapi local API docs
        run: |
          mkdir -p out
          go run ./tools/migrationdocs -manifest docs/migration/daemon/riidoapi-local-api.riido.json -check-doc -evidence-out out/migration-daemon-riidoapi-local-api-docs.json
          go run ./tools/docmap -check -evidence-out out/doc-map-evidence.json
          go run ./tools/knowledgecoverage -manifest docs/executable-knowledge.riido.json -check-doc -evidence-out out/knowledge-coverage.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: migration-daemon-riidoapi-local-api-docs
          path: out/*.json
          if-no-files-found: error
