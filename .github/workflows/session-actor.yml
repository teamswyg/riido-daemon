name: session-actor

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/session-actor.yml"
      - "internal/agentbridge/**"
      - "internal/process/**"
      - "docs/20-domain/provider-runtime.md"
      - "docs/migration/daemon.md"
      - "go.mod"
      - "go.sum"
  pull_request:
    paths:
      - ".github/workflows/session-actor.yml"
      - "internal/agentbridge/**"
      - "internal/process/**"
      - "docs/20-domain/provider-runtime.md"
      - "docs/migration/daemon.md"
      - "go.mod"
      - "go.sum"

jobs:
  run-scope-session-actor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify no non-Riido Go dependencies
        run: |
          allowed="github.com/teamswyg/riido-contracts"
          disallowed="$(go list -m all | awk -v allowed="$allowed" 'NR > 1 && $1 != allowed { print $1 }')"
          if [ -n "$disallowed" ]; then
            printf 'Disallowed Go dependencies:\n%s\n' "$disallowed"
            exit 1
          fi
      - name: Verify session actor gates
        run: |
          go test ./internal/agentbridge/session ./internal/process -run 'Session|ProtocolDriver|Burst|Goroutine|TempFiles|Timeout|Cancellation|ProcessExit|DefaultBuffers|ToolStart|AutoApproval' -count=1
      - name: Write package workflow evidence
        if: always()
        run: |
          mkdir -p out
          go run ./tools/packageworkflowevidence \
            -workflow .github/workflows/session-actor.yml \
            -evidence-out out/session-actor-evidence.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: session-actor-evidence
          path: out/session-actor-evidence.json
          if-no-files-found: error
