name: draft-fields

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/draft-fields.yml"
      - "docs/20-domain/provider-runtime/adapter-draft-fields/allowed-fields.md"
      - "docs/20-domain/provider-runtime/adapter-draft-fields/forbidden-fields.md"
      - "docs/20-domain/provider-runtime/adapter-draft-fields/draft-field-surface.riido.json"
      - "internal/agentbridge/adapter_parser.go"
      - "internal/agentbridge/event.go"
      - "internal/agentbridge/supervisor/provider_event_draft.go"
      - "internal/agentbridge/supervisor/terminal_result_draft.go"
      - "tools/draftfields/**"
      - "go.mod"
      - "go.sum"

jobs:
  draft-fields-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify draft field surface
        run: |
          mkdir -p out
          go test ./tools/draftfields -count=1
          go run ./tools/draftfields \
            -check-doc \
            -evidence-out out/draft-fields-evidence.json
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: draft-fields-evidence
          path: out/draft-fields-evidence.json
          if-no-files-found: error
