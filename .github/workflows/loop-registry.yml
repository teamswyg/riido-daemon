name: loop-registry

on:
  pull_request:
    paths:
      - ".github/workflows/loop-registry.yml"
      - ".github/workflows/local-qa-runner.yml"
      - ".github/workflows/product-loop-evidence.yml"
      - ".pre-commit-config.yaml"
      - "docs/30-architecture/loop-registry.riido.json"
      - "docs/30-architecture/loop-registry.md"
      - "docs/30-architecture/entrypoint-route-map.riido.json"
      - "docs/30-architecture/entrypoint-route-map.md"
      - "docs/30-architecture/product-loop-evidence.riido.json"
      - "docs/30-architecture/product-loop-evidence.md"
      - "docs/30-architecture/loop-engineering.riido.json"
      - "docs/30-architecture/loop-engineering/loop-registry.riido.json"
      - "docs/30-architecture/loop-engineering/**"
      - "tools/loopregistry/**"
      - "tools/productloopevidence/**"
      - "tools/localproductacceptance/**"
      - "tools/localqacandidatedecision/**"
      - "tools/localqarunner/**"
      - "tools/localqadashboard/**"
      - "tools/providerintegrationevidence/**"
      - ".github/workflows/release-artifacts.yml"
      - ".github/workflows/cdn-latest-ai-agent.yml"
      - "docs/30-architecture/release-artifacts.riido.json"
      - "docs/30-architecture/release-artifacts.md"
      - "docs/30-architecture/release-artifacts/**"
      - "scripts/build-release-package.sh"
      - "scripts/publish-release-artifacts.sh"
      - "scripts/publish-cdn-latest.sh"
      - "scripts/install-riido-daemon.sh"
      - "tools/releaseartifacts/**"
      - "cmd/riido/bridge_adapter_claude.go"
      - "cmd/riido/bridge_adapter_claude_mcp*"
      - "cmd/riido/bridge_adapter_start_test.go"
      - "cmd/riido/claude_permission_mcp_*"
      - "cmd/riido/daemon_ipc_tool_approval*"
      - "internal/agentbridge/**"
      - "internal/agentbridge/controlplane/saasplane/**"
      - "internal/provider/claude/**"
      - "docs/30-architecture/qa-system.dsl.json"
      - "docs/30-architecture/local-qa-daily-trigger.dsl.json"
      - "docs/30-architecture/local-acceptance-coverage.riido.json"
      - "docs/30-architecture/local-qa-candidate-decision.riido.json"
      - "docs/30-architecture/local-qa-candidate-decision.md"
      - "docs/readme/local-acceptance.riido.json"
      - "docs/readme/local-acceptance.md"
      - "go.mod"
      - "go.sum"
  push:
    branches: [main]
    paths:
      - ".github/workflows/loop-registry.yml"
      - ".github/workflows/local-qa-runner.yml"
      - ".github/workflows/product-loop-evidence.yml"
      - ".pre-commit-config.yaml"
      - "docs/30-architecture/loop-registry.riido.json"
      - "docs/30-architecture/loop-registry.md"
      - "docs/30-architecture/entrypoint-route-map.riido.json"
      - "docs/30-architecture/entrypoint-route-map.md"
      - "docs/30-architecture/product-loop-evidence.riido.json"
      - "docs/30-architecture/product-loop-evidence.md"
      - "docs/30-architecture/loop-engineering.riido.json"
      - "docs/30-architecture/loop-engineering/loop-registry.riido.json"
      - "docs/30-architecture/loop-engineering/**"
      - "tools/loopregistry/**"
      - "tools/productloopevidence/**"
      - "tools/localproductacceptance/**"
      - "tools/localqacandidatedecision/**"
      - "tools/localqarunner/**"
      - "tools/localqadashboard/**"
      - "tools/providerintegrationevidence/**"
      - ".github/workflows/release-artifacts.yml"
      - ".github/workflows/cdn-latest-ai-agent.yml"
      - "docs/30-architecture/release-artifacts.riido.json"
      - "docs/30-architecture/release-artifacts.md"
      - "docs/30-architecture/release-artifacts/**"
      - "scripts/build-release-package.sh"
      - "scripts/publish-release-artifacts.sh"
      - "scripts/publish-cdn-latest.sh"
      - "scripts/install-riido-daemon.sh"
      - "tools/releaseartifacts/**"
      - "cmd/riido/bridge_adapter_claude.go"
      - "cmd/riido/bridge_adapter_claude_mcp*"
      - "cmd/riido/bridge_adapter_start_test.go"
      - "cmd/riido/claude_permission_mcp_*"
      - "cmd/riido/daemon_ipc_tool_approval*"
      - "internal/agentbridge/**"
      - "internal/agentbridge/controlplane/saasplane/**"
      - "internal/provider/claude/**"
      - "docs/30-architecture/qa-system.dsl.json"
      - "docs/30-architecture/local-qa-daily-trigger.dsl.json"
      - "docs/30-architecture/local-acceptance-coverage.riido.json"
      - "docs/30-architecture/local-qa-candidate-decision.riido.json"
      - "docs/30-architecture/local-qa-candidate-decision.md"
      - "docs/readme/local-acceptance.riido.json"
      - "docs/readme/local-acceptance.md"
      - "go.mod"
      - "go.sum"

jobs:
  loop-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify loop registry
        run: |
          mkdir -p out
          go test ./tools/loopregistry -count=1
          go run ./tools/loopregistry -check-doc -evidence-out out/loop-registry.json
      - name: Verify changed file claim bindings
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p out
          git diff --name-only origin/${{ github.base_ref }}...HEAD > out/changed-files.txt
          git show origin/${{ github.base_ref }}:docs/30-architecture/loop-registry.riido.json > out/previous-loop-registry.riido.json
          go run ./tools/loopregistry -check-doc -github-annotations -changed-files out/changed-files.txt -previous-manifest out/previous-loop-registry.riido.json -evidence-out out/loop-registry-changed.json
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: loop-registry
          path: out/*
          if-no-files-found: error
