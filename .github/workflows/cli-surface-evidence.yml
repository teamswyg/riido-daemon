name: cli-surface-evidence

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/cli-surface-evidence.yml"
      - "cmd/riido/**"
      - "docs/30-architecture/cli-surface.md"
      - "docs/30-architecture/cli-surface.riido.json"
      - "docs/30-architecture/cli-surface/**"
      - "tools/clisurface/**"
      - "go.mod"
      - "go.sum"
  pull_request:
    paths:
      - ".github/workflows/cli-surface-evidence.yml"
      - "cmd/riido/**"
      - "docs/30-architecture/cli-surface.md"
      - "docs/30-architecture/cli-surface.riido.json"
      - "docs/30-architecture/cli-surface/**"
      - "tools/clisurface/**"
      - "go.mod"
      - "go.sum"

jobs:
  cli-surface-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify CLI surface evidence
        run: |
          mkdir -p out
          go test ./tools/clisurface -count=1
          go run ./tools/clisurface \
            -check-doc \
            -evidence-out out/cli-surface-evidence.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cli-surface-evidence
          path: out/cli-surface-evidence.json
          if-no-files-found: error
