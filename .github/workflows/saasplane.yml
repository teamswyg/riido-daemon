name: saasplane

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/saasplane.yml"
      - "internal/agentbridge/controlplane/saasplane/**"
      - "internal/agentbridge/controlplane/**"
      - "internal/agentbridge/bridge/**"
      - "internal/agentbridge/**"
      - "docs/20-domain/provider-runtime.md"
      - "docs/20-domain/runtime-scheduling.md"
      - "docs/migration/daemon.md"
      - "go.mod"
      - "go.sum"
  pull_request:
    paths:
      - ".github/workflows/saasplane.yml"
      - "internal/agentbridge/controlplane/saasplane/**"
      - "internal/agentbridge/controlplane/**"
      - "internal/agentbridge/bridge/**"
      - "internal/agentbridge/**"
      - "docs/20-domain/provider-runtime.md"
      - "docs/20-domain/runtime-scheduling.md"
      - "docs/migration/daemon.md"
      - "go.mod"
      - "go.sum"

jobs:
  saasplane-assignment-polling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify no non-Riido Go dependencies
        run: |
          allowed="github.com/teamswyg/riido-contracts"
          disallowed="$(go list -m all | awk -v allowed="$allowed" 'NR > 1 && $1 != allowed { print $1 }')"
          if [ -n "$disallowed" ]; then
            printf 'Disallowed Go dependencies:\n%s\n' "$disallowed"
            exit 1
          fi
      - name: Verify saasplane public boundary
        run: |
          imports="$(go list -deps -test -f '{{if not .Standard}}{{.ImportPath}}{{end}}' ./internal/agentbridge/controlplane/saasplane)"
          forbidden="$(printf '%s\n' "$imports" | grep -E 'github.com/teamswyg/riido_daemon|github.com/teamswyg/riido-daemon/internal/(project|riidoapi|riidoaiserver|mwsdbridge|provider/|taskdb|agentbridge/controlplane/taskdbplane)' || true)"
          if [ -n "$forbidden" ]; then
            printf 'Forbidden saasplane imports:\n%s\n' "$forbidden"
            exit 1
          fi
      - name: Verify saasplane black-box/domain gates
        run: |
          go test ./internal/agentbridge/controlplane/saasplane -count=1
          go test ./internal/agentbridge/controlplane/... -count=1
      - name: Write package workflow evidence
        if: always()
        run: |
          mkdir -p out
          go run ./tools/packageworkflowevidence \
            -workflow .github/workflows/saasplane.yml \
            -evidence-out out/saasplane-evidence.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: saasplane-evidence
          path: out/saasplane-evidence.json
          if-no-files-found: error
