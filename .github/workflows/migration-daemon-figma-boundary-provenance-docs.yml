name: migration-daemon-figma-boundary-provenance-docs

on:
  pull_request:
    paths:
      - ".github/workflows/migration-daemon-figma-boundary-provenance-docs.yml"
      - "docs/migration/daemon/figma-boundary-provenance.md"
      - "docs/migration/daemon/figma-boundary-provenance.riido.json"
      - "docs/migration/daemon/figma-boundary-provenance/**"
      - "docs/executable-knowledge.md"
      - "docs/executable-knowledge.riido.json"
      - "tools/migrationdocs/**"
      - "tools/docmap/**"
      - "tools/knowledgecoverage/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/migration-daemon-figma-boundary-provenance-docs.yml"
      - "docs/migration/daemon/figma-boundary-provenance.md"
      - "docs/migration/daemon/figma-boundary-provenance.riido.json"
      - "docs/migration/daemon/figma-boundary-provenance/**"
      - "docs/executable-knowledge.md"
      - "docs/executable-knowledge.riido.json"
      - "tools/migrationdocs/**"
      - "tools/docmap/**"
      - "tools/knowledgecoverage/**"

jobs:
  migration-daemon-figma-boundary-provenance-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify migration daemon figma boundary provenance docs
        run: |
          mkdir -p out
          go run ./tools/migrationdocs -manifest docs/migration/daemon/figma-boundary-provenance.riido.json -check-doc -evidence-out out/migration-daemon-figma-boundary-provenance-docs.json
          go run ./tools/docmap -check -evidence-out out/doc-map-evidence.json
          go run ./tools/knowledgecoverage -manifest docs/executable-knowledge.riido.json -check-doc -evidence-out out/knowledge-coverage.json
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: migration-daemon-figma-boundary-provenance-docs
          path: out/*.json
          if-no-files-found: error
