name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify no non-Riido Go dependencies
        run: |
          disallowed="$(go list -m all | awk 'NR > 1 && $1 !~ /^github.com\\/teamswyg\\/riido-contracts$/ { print $1 }')"
          test -z "$disallowed"
      - name: Test
        run: go test ./...
