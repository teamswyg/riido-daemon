name: runtime-secret-private-evidence

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/runtime-secret-private-evidence.yml"
      - "docs/30-architecture/runtime-secret-private-evidence.md"
      - "docs/30-architecture/runtime-secret-private-evidence.riido.json"
      - "docs/20-domain/security/native-config-overlay/runtime-secret-evidence.md"
      - "tools/runtimesecretevidence/**"
      - "go.mod"
      - "go.sum"

jobs:
  public-secret-evidence-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify runtime secret private evidence boundary
        run: |
          mkdir -p out
          go test ./tools/runtimesecretevidence -count=1
          go run ./tools/runtimesecretevidence \
            -check-doc \
            -evidence-out out/runtime-secret-private-evidence.json
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: runtime-secret-private-evidence
          path: out/runtime-secret-private-evidence.json
          if-no-files-found: error
