name: supervisor

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/supervisor.yml"
      - "internal/agentbridge/supervisor/**"
      - "internal/agentbridge/controlplane/**"
      - "internal/agentbridge/runtimeactor/**"
      - "internal/agentbridge/bridge/**"
      - "internal/agentbridge/session/**"
      - "internal/agentbridge/toolargs/**"
      - "internal/ir/ingest/**"
      - "internal/policy/**"
      - "internal/process/**"
      - "internal/scheduling/**"
      - "internal/workdir/**"
      - "docs/20-domain/provider-runtime.md"
      - "docs/20-domain/runtime-scheduling.md"
      - "docs/migration/daemon.md"
      - "go.mod"
      - "go.sum"
  pull_request:
    paths:
      - ".github/workflows/supervisor.yml"
      - "internal/agentbridge/supervisor/**"
      - "internal/agentbridge/controlplane/**"
      - "internal/agentbridge/runtimeactor/**"
      - "internal/agentbridge/bridge/**"
      - "internal/agentbridge/session/**"
      - "internal/agentbridge/toolargs/**"
      - "internal/ir/ingest/**"
      - "internal/policy/**"
      - "internal/process/**"
      - "internal/scheduling/**"
      - "internal/workdir/**"
      - "docs/20-domain/provider-runtime.md"
      - "docs/20-domain/runtime-scheduling.md"
      - "docs/migration/daemon.md"
      - "go.mod"
      - "go.sum"

jobs:
  supervisor-run-controller-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify no non-Riido Go dependencies
        run: |
          allowed="github.com/teamswyg/riido-contracts"
          disallowed="$(go list -m all | awk -v allowed="$allowed" 'NR > 1 && $1 != allowed { print $1 }')"
          if [ -n "$disallowed" ]; then
            printf 'Disallowed Go dependencies:\n%s\n' "$disallowed"
            exit 1
          fi
      - name: Verify supervisor dependency boundary
        run: |
          imports="$(go list -deps -f '{{if not .Standard}}{{.ImportPath}}{{end}}' ./internal/agentbridge/supervisor)"
          forbidden="$(printf '%s\n' "$imports" | grep -E 'github.com/teamswyg/riido_daemon|github.com/teamswyg/riido-daemon/internal/(provider|task|project|riidoapi|riidoaiserver|mwsdbridge|agentbridge/controlplane/(saasplane|taskdbplane))' || true)"
          if [ -n "$forbidden" ]; then
            printf 'Forbidden supervisor imports:\n%s\n' "$forbidden"
            exit 1
          fi
      - name: Verify supervisor black-box/domain gates
        run: |
          go test ./internal/agentbridge/supervisor -count=1
