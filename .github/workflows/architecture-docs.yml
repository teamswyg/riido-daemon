name: architecture-docs

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/architecture-docs.yml"
      - "docs/20-domain/**"
      - "docs/30-architecture/**"
      - "docs/50-roadmap/**"
      - "docs/migration/**"
      - "scripts/verify-architecture-docs.sh"
      - "scripts/verify-riido-work-branch.sh"
      - "tools/figmaboundary/**"
      - "tools/agentexecutionevidence/**"
      - "tools/providervalidation/**"
  pull_request:
    paths:
      - ".github/workflows/architecture-docs.yml"
      - "docs/20-domain/**"
      - "docs/30-architecture/**"
      - "docs/50-roadmap/**"
      - "docs/migration/**"
      - "scripts/verify-architecture-docs.sh"
      - "scripts/verify-riido-work-branch.sh"
      - "tools/figmaboundary/**"
      - "tools/agentexecutionevidence/**"
      - "tools/providervalidation/**"

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify architecture docs
        run: scripts/verify-architecture-docs.sh
