name: architecture-docs

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/architecture-docs.yml"
      - "docs/20-domain/**"
      - "docs/30-architecture/**"
      - "docs/50-roadmap/**"
      - "docs/migration/**"
      - "scripts/verify-architecture-docs.sh"
      - ".github/workflows/compatibility-gate.yml"
      - "scripts/verify-riido-work-branch.sh"
      - "tools/figmaboundary/**"
      - "tools/agentexecutionevidence/**"
      - "tools/providervalidation/**"
      - "tools/loopevidence/**"
      - "tools/docmap/**"
      - "tools/repoverification/**"
      - "tools/semanticeventactivity/**"
      - "tools/eventauthority/**"
      - "tools/providerdraftmapping/**"
      - "tools/terminalresultmapping/**"
      - "tools/shutdownauthority/**"
      - "tools/approvaltimeout/**"
      - "tools/processlifecycle/**"
      - "tools/draftfields/**"
      - "tools/sessionlifecycle/**"
      - "tools/branchgate/**"
      - "tools/compatibilitygate/**"
      - "tools/redactiondrift/**"
      - "tools/providerintegrationevidence/**"
      - "tools/runtimesecretevidence/**"
  pull_request:
    paths:
      - ".github/workflows/architecture-docs.yml"
      - "docs/20-domain/**"
      - "docs/30-architecture/**"
      - "docs/50-roadmap/**"
      - "docs/migration/**"
      - "scripts/verify-architecture-docs.sh"
      - ".github/workflows/compatibility-gate.yml"
      - "scripts/verify-riido-work-branch.sh"
      - "tools/figmaboundary/**"
      - "tools/agentexecutionevidence/**"
      - "tools/providervalidation/**"
      - "tools/loopevidence/**"
      - "tools/docmap/**"
      - "tools/repoverification/**"
      - "tools/semanticeventactivity/**"
      - "tools/eventauthority/**"
      - "tools/providerdraftmapping/**"
      - "tools/terminalresultmapping/**"
      - "tools/shutdownauthority/**"
      - "tools/approvaltimeout/**"
      - "tools/processlifecycle/**"
      - "tools/draftfields/**"
      - "tools/sessionlifecycle/**"
      - "tools/branchgate/**"
      - "tools/compatibilitygate/**"
      - "tools/redactiondrift/**"
      - "tools/providerintegrationevidence/**"
      - "tools/runtimesecretevidence/**"

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify architecture docs
        run: scripts/verify-architecture-docs.sh
