name: architecture-docs

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/architecture-docs.yml"
      - "docs/20-domain/**"
      - "docs/30-architecture/**"
      - "docs/50-roadmap/**"
      - "docs/migration/**"
      - "scripts/verify-architecture-docs.sh"
      - "scripts/architecture-docs/**"
      - ".github/workflows/compatibility-gate.yml"
      - ".github/workflows/runtime-upgrade-flow.yml"
      - ".github/workflows/local-daemon-contract-evidence.yml"
      - ".github/workflows/saas-assignment-source.yml"
      - ".github/workflows/validation-evidence.yml"
      - ".github/workflows/policy-bundle-loader-evidence.yml"
      - ".github/workflows/tool-use-gate-evidence.yml"
      - ".github/workflows/native-config-mcp-evidence.yml"
      - ".github/workflows/full-access-harness-evidence.yml"
      - ".github/workflows/assignment-fsm-evidence.yml"
      - ".github/workflows/privacy-metadata-evidence.yml"
      - ".github/workflows/store-distribution-contract.yml"
      - ".github/workflows/unsafe-bypass-evidence.yml"
      - "scripts/verify-riido-work-branch.sh"
      - "tools/**"
  pull_request:
    paths:
      - ".github/workflows/architecture-docs.yml"
      - "docs/20-domain/**"
      - "docs/30-architecture/**"
      - "docs/50-roadmap/**"
      - "docs/migration/**"
      - "scripts/verify-architecture-docs.sh"
      - "scripts/architecture-docs/**"
      - ".github/workflows/compatibility-gate.yml"
      - ".github/workflows/runtime-upgrade-flow.yml"
      - ".github/workflows/local-daemon-contract-evidence.yml"
      - ".github/workflows/saas-assignment-source.yml"
      - ".github/workflows/validation-evidence.yml"
      - ".github/workflows/policy-bundle-loader-evidence.yml"
      - ".github/workflows/tool-use-gate-evidence.yml"
      - ".github/workflows/native-config-mcp-evidence.yml"
      - ".github/workflows/full-access-harness-evidence.yml"
      - ".github/workflows/assignment-fsm-evidence.yml"
      - ".github/workflows/privacy-metadata-evidence.yml"
      - ".github/workflows/store-distribution-contract.yml"
      - ".github/workflows/unsafe-bypass-evidence.yml"
      - "scripts/verify-riido-work-branch.sh"
      - "tools/**"

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify architecture docs
        run: scripts/verify-architecture-docs.sh
