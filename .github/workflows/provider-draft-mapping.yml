name: provider-draft-mapping

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/provider-draft-mapping.yml"
      - "docs/20-domain/provider-runtime/runtime-responsibility/provider-event-draft.md"
      - "docs/20-domain/provider-runtime/runtime-responsibility/provider-event-draft.riido.json"
      - "internal/agentbridge/event_kind*.go"
      - "internal/agentbridge/supervisor/provider_event_draft.go"
      - "tools/providerdraftmapping/**"
      - "go.mod"
      - "go.sum"

jobs:
  provider-draft-mapping-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify provider draft mapping
        run: |
          mkdir -p out
          go test ./tools/providerdraftmapping -count=1
          go run ./tools/providerdraftmapping \
            -check-doc \
            -evidence-out out/provider-draft-mapping-evidence.json
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: provider-draft-mapping-evidence
          path: out/provider-draft-mapping-evidence.json
          if-no-files-found: error
