name: workflow-evidence

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "docs/30-architecture/workflow-evidence.md"
      - "docs/30-architecture/workflow-evidence.riido.json"
      - "tools/cievidence/**"
      - "tools/packageworkflowevidence/**"
      - "tools/workflowevidence/**"
      - "go.mod"
      - "go.sum"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "docs/30-architecture/workflow-evidence.md"
      - "docs/30-architecture/workflow-evidence.riido.json"
      - "tools/cievidence/**"
      - "tools/packageworkflowevidence/**"
      - "tools/workflowevidence/**"
      - "go.mod"
      - "go.sum"

jobs:
  workflow-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify workflow evidence coverage
        run: |
          mkdir -p out
          go test ./tools/workflowevidence -count=1
          go run ./tools/workflowevidence \
            -check-doc \
            -evidence-out out/workflow-evidence.json
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: workflow-evidence
          path: out/workflow-evidence.json
          if-no-files-found: error
