name: provider-runtime-responsibility-docs

on:
  pull_request:
    paths:
      - ".github/workflows/provider-runtime-responsibility-docs.yml"
      - "docs/20-domain/provider-runtime/runtime-responsibility.md"
      - "docs/20-domain/provider-runtime/runtime-responsibility.riido.json"
      - "docs/20-domain/provider-runtime/runtime-responsibility/**"
      - "tools/providerruntimeresponsibilitydocs/**"
      - "tools/providerdraftmapping/**"
      - "internal/agentbridge/**"
      - "internal/provider/**"
      - "internal/scheduling/**"
      - "go.mod"
      - "go.sum"
  push:
    branches: [main]
    paths:
      - ".github/workflows/provider-runtime-responsibility-docs.yml"
      - "docs/20-domain/provider-runtime/runtime-responsibility.md"
      - "docs/20-domain/provider-runtime/runtime-responsibility.riido.json"
      - "docs/20-domain/provider-runtime/runtime-responsibility/**"
      - "tools/providerruntimeresponsibilitydocs/**"
      - "tools/providerdraftmapping/**"
      - "internal/agentbridge/**"
      - "internal/provider/**"
      - "internal/scheduling/**"
      - "go.mod"
      - "go.sum"

jobs:
  provider-runtime-responsibility-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify provider runtime responsibility docs
        run: |
          mkdir -p out
          go run ./tools/providerruntimeresponsibilitydocs \
            -check-doc \
            -evidence-out out/provider-runtime-responsibility-docs.json
          go run ./tools/providerdraftmapping \
            -check-doc \
            -evidence-out out/provider-draft-mapping-evidence.json
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: provider-runtime-responsibility-docs
          path: out/*.json
          if-no-files-found: error
