name: mwsd-project

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/mwsd-project.yml"
      - "cmd/riido/**"
      - "internal/mwsdbridge/**"
      - "internal/project/**"
      - "internal/taskdb/**"
      - "docs/migration/cli.md"
      - "docs/migration/daemon.md"
      - "go.mod"
      - "go.sum"
  pull_request:
    paths:
      - ".github/workflows/mwsd-project.yml"
      - "cmd/riido/**"
      - "internal/mwsdbridge/**"
      - "internal/project/**"
      - "internal/taskdb/**"
      - "docs/migration/cli.md"
      - "docs/migration/daemon.md"
      - "go.mod"
      - "go.sum"

jobs:
  mwsd-project-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify no non-Riido Go dependencies
        run: |
          allowed="github.com/teamswyg/riido-contracts"
          disallowed="$(go list -m all | awk -v allowed="$allowed" 'NR > 1 && $1 != allowed { print $1 }')"
          if [ -n "$disallowed" ]; then
            printf 'Disallowed Go dependencies:\n%s\n' "$disallowed"
            exit 1
          fi
      - name: Verify mwsd/project public boundary
        run: |
          if grep -R --line-number -E 'github.com/teamswyg/riido_daemon|github.com/teamswyg/riido-daemon/internal/riidoaiserver' internal/mwsdbridge internal/project cmd/riido; then
            echo "mwsd/project migration must not depend on private daemon/server packages"
            exit 1
          fi
          if grep -R --line-number -E 'github.com/teamswyg/riido-daemon/internal/agentbridge/controlplane/saasplane' internal/mwsdbridge internal/project; then
            echo "mwsd/project packages must not depend on SaaS assignment adapters"
            exit 1
          fi
      - name: Verify local-only listener gate
        run: |
          if grep -R --line-number -E 'net\.Listen\("tcp"|http\.ListenAndServe|:8080|0\.0\.0\.0' internal/mwsdbridge internal/project cmd/riido; then
            echo "mwsd/project CLI slice must not open public TCP listeners"
            exit 1
          fi
      - name: Verify mwsd/project behavior
        run: |
          go test ./internal/mwsdbridge ./internal/project ./cmd/riido -count=1
          go build -o /tmp/riido-mwsd-check ./cmd/riido
          go run ./cmd/riido --help >/tmp/riido-help.txt 2>&1
          grep -q 'riido mwsd <snapshot|projection|sync|orchestration|projects|status>' /tmp/riido-help.txt
      - name: Write package workflow evidence
        if: always()
        run: |
          mkdir -p out
          go run ./tools/packageworkflowevidence \
            -workflow .github/workflows/mwsd-project.yml \
            -evidence-out out/mwsd-project-evidence.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mwsd-project-evidence
          path: out/mwsd-project-evidence.json
          if-no-files-found: error
