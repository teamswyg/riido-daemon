name: module-decomposition-docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/module-decomposition-docs.yml"
      - "docs/30-architecture/module-decomposition.riido.json"
      - "docs/30-architecture/module-decomposition.md"
      - "docs/30-architecture/module-decomposition/**"
      - "tools/moduledecomposition/**"
      - "cmd/**"
      - "internal/**"
      - "pkg/**"
      - "go.mod"
      - "go.sum"
  pull_request:
    paths:
      - ".github/workflows/module-decomposition-docs.yml"
      - "docs/30-architecture/module-decomposition.riido.json"
      - "docs/30-architecture/module-decomposition.md"
      - "docs/30-architecture/module-decomposition/**"
      - "tools/moduledecomposition/**"
      - "cmd/**"
      - "internal/**"
      - "pkg/**"
      - "go.mod"
      - "go.sum"

jobs:
  module-decomposition-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify module decomposition docs
        run: |
          mkdir -p out
          go test ./tools/moduledecomposition -count=1
          go run ./tools/moduledecomposition \
            -check-doc \
            -evidence-out out/module-decomposition-docs.json
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: module-decomposition-docs
          path: out/module-decomposition-docs.json
          if-no-files-found: error
