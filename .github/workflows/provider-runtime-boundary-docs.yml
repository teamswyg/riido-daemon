name: provider-runtime-boundary-docs

on:
  pull_request:
    paths:
      - ".github/workflows/provider-runtime-boundary-docs.yml"
      - "docs/20-domain/provider-runtime/runtime-actor-boundary.md"
      - "docs/20-domain/provider-runtime/runtime-actor-boundary.riido.json"
      - "docs/20-domain/provider-runtime/runtime-actor-boundary/**"
      - "tools/providerruntimeboundarydocs/**"
      - "internal/agentbridge/**"
      - "internal/provider/**"
      - "internal/scheduling/**"
      - "internal/workdir/**"
      - "go.mod"
      - "go.sum"
  push:
    branches: [main]
    paths:
      - ".github/workflows/provider-runtime-boundary-docs.yml"
      - "docs/20-domain/provider-runtime/runtime-actor-boundary.md"
      - "docs/20-domain/provider-runtime/runtime-actor-boundary.riido.json"
      - "docs/20-domain/provider-runtime/runtime-actor-boundary/**"
      - "tools/providerruntimeboundarydocs/**"
      - "internal/agentbridge/**"
      - "internal/provider/**"
      - "internal/scheduling/**"
      - "internal/workdir/**"
      - "go.mod"
      - "go.sum"

jobs:
  provider-runtime-boundary-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify provider runtime boundary docs
        run: |
          mkdir -p out
          go run ./tools/providerruntimeboundarydocs \
            -check-doc \
            -evidence-out out/provider-runtime-boundary-docs.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: provider-runtime-boundary-docs
          path: out/*.json
          if-no-files-found: error
