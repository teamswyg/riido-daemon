name: cli

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/cli.yml"
      - "cmd/riido/**"
      - "internal/mwsdbridge/**"
      - "internal/project/**"
      - "internal/taskdb/**"
      - "internal/riidoapi/**"
      - "internal/agentbridge/**"
      - "internal/provider/**"
      - "internal/validation/**"
      - "docs/migration/cli.md"
      - "docs/migration/daemon.md"
      - "go.mod"
      - "go.sum"
  pull_request:
    paths:
      - ".github/workflows/cli.yml"
      - "cmd/riido/**"
      - "internal/mwsdbridge/**"
      - "internal/project/**"
      - "internal/taskdb/**"
      - "internal/riidoapi/**"
      - "internal/agentbridge/**"
      - "internal/provider/**"
      - "internal/validation/**"
      - "docs/migration/cli.md"
      - "docs/migration/daemon.md"
      - "go.mod"
      - "go.sum"

jobs:
  cli-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify no non-Riido Go dependencies
        run: |
          allowed="github.com/teamswyg/riido-contracts"
          disallowed="$(go list -m all | awk -v allowed="$allowed" 'NR > 1 && $1 != allowed { print $1 }')"
          if [ -n "$disallowed" ]; then
            printf 'Disallowed Go dependencies:\n%s\n' "$disallowed"
            exit 1
          fi
      - name: Verify CLI public boundary
        run: |
          if grep -R --line-number -E 'github.com/teamswyg/riido_daemon|github.com/teamswyg/riido-daemon/internal/riidoaiserver' cmd/riido; then
            echo "cmd/riido must stay inside public daemon boundaries"
            exit 1
          fi
      - name: Verify CLI local-only gate
        run: |
          if grep -R --line-number -E 'net\.Listen\("tcp"|http\.ListenAndServe|:8080|0\.0\.0\.0' cmd/riido; then
            echo "cmd/riido must not open public TCP listeners"
            exit 1
          fi
      - name: Verify CLI build and behavior
        run: |
          go test ./cmd/riido ./internal/taskdb ./internal/riidoapi ./internal/validation -count=1
          go build -o /tmp/riido-cli-check ./cmd/riido
          go run ./cmd/riido --help >/tmp/riido-help.txt 2>&1
          grep -q 'riido bridge <providers|detect>' /tmp/riido-help.txt
          grep -q 'riido mwsd <snapshot|projection|sync|orchestration|projects|status>' /tmp/riido-help.txt
          grep -q 'riido daemon start' /tmp/riido-help.txt
          go run ./cmd/riido bridge providers | grep -q '"name": "codex"'
      - name: Write package workflow evidence
        if: always()
        run: |
          mkdir -p out
          go run ./tools/packageworkflowevidence \
            -workflow .github/workflows/cli.yml \
            -evidence-out out/cli-evidence.json
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: cli-evidence
          path: out/cli-evidence.json
          if-no-files-found: error
