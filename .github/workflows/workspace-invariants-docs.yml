name: workspace-invariants-docs

on:
  pull_request:
    paths:
      - ".github/workflows/workspace-invariants-docs.yml"
      - "docs/20-domain/workspace/invariants.md"
      - "docs/20-domain/workspace/invariants.riido.json"
      - "docs/20-domain/workspace/invariants/**"
      - "docs/20-domain/workspace/native-config-manifest**"
      - "docs/20-domain/security/**"
      - "docs/20-domain/distribution-host-integration/**"
      - "tools/workspaceinvariantsdocs/**"
      - "internal/workdir/**"
      - "internal/hostintegration/workspace_grant*.go"
      - "cmd/riido/daemon_config_workdir*.go"
      - "go.mod"
      - "go.sum"
  push:
    branches: [main]
    paths:
      - ".github/workflows/workspace-invariants-docs.yml"
      - "docs/20-domain/workspace/invariants.md"
      - "docs/20-domain/workspace/invariants.riido.json"
      - "docs/20-domain/workspace/invariants/**"
      - "docs/20-domain/workspace/native-config-manifest**"
      - "docs/20-domain/security/**"
      - "docs/20-domain/distribution-host-integration/**"
      - "tools/workspaceinvariantsdocs/**"
      - "internal/workdir/**"
      - "internal/hostintegration/workspace_grant*.go"
      - "cmd/riido/daemon_config_workdir*.go"
      - "go.mod"
      - "go.sum"

jobs:
  workspace-invariants-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify workspace invariants docs
        run: |
          mkdir -p out
          go run ./tools/workspaceinvariantsdocs \
            -check-doc \
            -evidence-out out/workspace-invariants-docs.json
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: workspace-invariants-docs
          path: out/*.json
          if-no-files-found: error
