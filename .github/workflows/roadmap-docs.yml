name: roadmap-docs

on:
  pull_request:
    paths:
      - ".github/workflows/roadmap-docs.yml"
      - "docs/50-roadmap/**"
      - "docs/readme/document-map.riido.json"
      - "docs/readme/document-map.md"
      - "docs/README.md"
      - "tools/roadmapdocs/**"
      - "tools/docmap/**"
      - "tools/knowledgecoverage/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/roadmap-docs.yml"
      - "docs/50-roadmap/**"
      - "docs/readme/document-map.riido.json"
      - "docs/readme/document-map.md"
      - "docs/README.md"
      - "tools/roadmapdocs/**"
      - "tools/docmap/**"
      - "tools/knowledgecoverage/**"

jobs:
  roadmap-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify roadmap docs
        run: |
          mkdir -p out
          go run ./tools/roadmapdocs -check-doc -evidence-out out/roadmap-docs.json
          go run ./tools/docmap -check -evidence-out out/doc-map-evidence.json
          go run ./tools/knowledgecoverage -manifest docs/executable-knowledge.riido.json -check-doc -evidence-out out/knowledge-coverage.json
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: roadmap-docs
          path: out/*.json
          if-no-files-found: error
