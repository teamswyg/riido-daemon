name: runtimeactor

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/runtimeactor.yml"
      - "internal/agentbridge/runtimeactor/**"
      - "internal/agentbridge/bridge/**"
      - "internal/agentbridge/session/**"
      - "internal/process/**"
      - "docs/20-domain/provider-runtime.md"
      - "docs/migration/daemon.md"
      - "go.mod"
      - "go.sum"
  pull_request:
    paths:
      - ".github/workflows/runtimeactor.yml"
      - "internal/agentbridge/runtimeactor/**"
      - "internal/agentbridge/bridge/**"
      - "internal/agentbridge/session/**"
      - "internal/process/**"
      - "docs/20-domain/provider-runtime.md"
      - "docs/migration/daemon.md"
      - "go.mod"
      - "go.sum"

jobs:
  runtimeactor-mailbox-capability-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify no non-Riido Go dependencies
        run: |
          allowed="github.com/teamswyg/riido-contracts"
          disallowed="$(go list -m all | awk -v allowed="$allowed" 'NR > 1 && $1 != allowed { print $1 }')"
          if [ -n "$disallowed" ]; then
            printf 'Disallowed Go dependencies:\n%s\n' "$disallowed"
            exit 1
          fi
      - name: Verify runtimeactor stays provider neutral
        run: |
          imports="$(go list -f '{{range .Imports}}{{println .}}{{end}}' ./internal/agentbridge/runtimeactor)"
          forbidden="$(printf '%s\n' "$imports" | grep -E 'github.com/teamswyg/riido-daemon/internal/(provider|task|ir|project|riidoapi|riidoaiserver|mwsdbridge|agentbridge/(supervisor|controlplane))' || true)"
          if [ -n "$forbidden" ]; then
            printf 'Forbidden runtimeactor imports:\n%s\n' "$forbidden"
            exit 1
          fi
      - name: Verify runtimeactor gates
        run: |
          go test ./internal/agentbridge/runtimeactor ./internal/agentbridge/session ./internal/process -run 'RuntimeActor|Capability|DetectedFingerprint|ProtocolDriver|Stop|Cancel|Heartbeat|Mailbox|Slot|Submit|Goroutine' -count=1
      - name: Write package workflow evidence
        if: always()
        run: |
          mkdir -p out
          go run ./tools/packageworkflowevidence \
            -workflow .github/workflows/runtimeactor.yml \
            -evidence-out out/runtimeactor-evidence.json
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: runtimeactor-evidence
          path: out/runtimeactor-evidence.json
          if-no-files-found: error
