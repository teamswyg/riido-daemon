name: repo-verification

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/repo-verification.yml"
      - "docs/readme/verification.md"
      - "docs/readme/verification.riido.json"
      - "tools/repoverification/**"
      - "go.mod"
      - "go.sum"

jobs:
  repo-verification-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Run repo verification commands
        run: |
          mkdir -p out
          go test ./tools/repoverification -count=1
          go run ./tools/repoverification \
            -check-doc \
            -run-commands \
            -evidence-out out/repo-verification-evidence.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: repo-verification-evidence
          path: out/repo-verification-evidence.json
          if-no-files-found: error
