name: assignment-fsm-evidence

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/assignment-fsm-evidence.yml"
      - "docs/30-architecture/agent-execution-unresolved-design/assignment-lifecycle-fsm.md"
      - "docs/30-architecture/agent-execution-unresolved-design/assignment-lifecycle-fsm.riido.json"
      - "docs/30-architecture/agent-execution-unresolved-design/assignment-lifecycle-evidence.riido.json"
      - "docs/30-architecture/agent-execution-unresolved-design/assignment-lifecycle-evidence/**"
      - "internal/contractscompat/**"
      - "tools/assignmentfsm/**"
      - "go.mod"
      - "go.sum"

jobs:
  assignment-fsm-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify assignment FSM evidence
        run: |
          mkdir -p out
          go test ./tools/assignmentfsm -count=1
          go run ./tools/assignmentfsm \
            -check-doc \
            -evidence-out out/assignment-fsm-evidence.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: assignment-fsm-evidence
          path: out/assignment-fsm-evidence.json
          if-no-files-found: error
