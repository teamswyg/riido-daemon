name: release-artifacts

on:
  pull_request:
    paths: [".github/workflows/release-artifacts.yml", "scripts/**", "cmd/riido/**", "internal/**", "docs/20-domain/**", "docs/30-architecture/**", "go.mod", "go.sum"]
  push:
    branches: ["**"]
    tags: ["v*"]
    paths: [".github/workflows/release-artifacts.yml", "scripts/**", "cmd/riido/**", "internal/**", "docs/20-domain/**", "docs/30-architecture/**", "go.mod", "go.sum"]

permissions: { contents: write }

jobs:
  build:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - darwin/amd64/tar
          - darwin/arm64/tar
          - linux/amd64/tar
          - linux/arm64/tar
          - windows/amd64/zip
          - windows/arm64/zip
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Verify no non-Riido Go dependencies
        run: scripts/verify-go-dependencies.sh

      - name: Test
        run: go test ./...

      - name: Build package
        shell: bash
        env:
          CGO_ENABLED: "0"
        run: scripts/build-release-package.sh "${{ matrix.target }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ env.RIIDO_RELEASE_ARTIFACT_NAME }}
          path: ${{ env.RIIDO_RELEASE_ARTIFACT_PATH }}
          if-no-files-found: error

  evidence:
    if: always() && (github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Write release artifact evidence
        run: |
          mkdir -p out
          go run ./tools/releaseartifacts \
            -evidence-out out/release-artifacts-evidence.json
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: release-artifacts-evidence
          path: out/release-artifacts-evidence.json
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: scripts/publish-release-artifacts.sh checksum

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/publish-release-artifacts.sh release
